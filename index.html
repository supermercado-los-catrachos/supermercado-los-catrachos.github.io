html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado Los Catrachos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        header { background-color: #0056b3; color: white; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; width: 250px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .price { color: #28a745; font-size: 1.25rem; font-weight: bold; margin: 10px 0; }
        .btn-order { display: inline-block; background-color: #25d366; color: white; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Supermercado Los Catrachos</h1>
    <p>¡Calidad y frescura a tu alcance!</p>
</header>

<div class="container">
    <!-- Producto 1 -->
    <div class="card">
        <h3>Arroz Clasificado</h3>
        <p>Presentación de 1 Lb</p>
        <div class="price">L 15.00</div>
        <a href="https://wa.me" target="_blank" class="btn-order">Pedir por WhatsApp</a>
    </div>

    <!-- Producto 2 -->
    <div class="card">
        <h3>Frijoles Rojos</h3>
        <p>Presentación de 1 Lb</p>
        <div class="price">L 20.00</div>
        <a href="https://wa.me" target="_blank" class="btn-order">Pedir por WhatsApp</a>
    </div>
</div>

</body>
</html>
