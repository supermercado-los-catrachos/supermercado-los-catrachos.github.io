<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado Los Catrachos</title>
    <style>
        /* ========== ESTILOS BASE TOTALMENTE SEGUROS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #f8f9fa;
            color: #212529;
        }

        /* ========== PANTALLA DE INICIO (IGUAL A TU IMAGEN) ========== */
        .welcome-screen {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #004d40, #00796b);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .welcome-logo {
            border: 2px solid #ffb300;
            border-radius: 50%;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ffb300;
            font-size: 1.6rem;
            margin-bottom: 30px;
        }
        .welcome-screen h1 {
            font-size: 2.4rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .welcome-screen p {
            font-size: 1.3rem;
            color: #e0f2f1;
        }
        .welcome-line {
            width: 200px;
            height: 4px;
            background-color: #ffb300;
            border-radius: 2px;
            margin: 15px auto 35px auto;
        }
        .btn-enter {
            background-color: #ffb300;
            color: #004d40;
            padding: 15px 50px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: inline-block;
            transition: transform 0.2s;
        }
        .btn-enter:hover {
            transform: scale(1.05);
            background-color: #ffa000;
        }

        /* ========== CONTENIDO DE LA TIENDA ========== */
        .store-section {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .store-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            color: #004d40;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .product-card h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #212529;
        }
        .product-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 15px;
        }
        .btn-cart {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO (ESTILO DE TU IMAGEN) -->
    <div class="welcome-screen">
        <div class="welcome-logo">LCH</div>
        <h1>Supermercado Los Catrachos</h1>
        <p>Calidad y frescura a tu alcance</p>
        <div class="welcome-line"></div>
        <!-- Enlace nativo HTML que baja la pantalla sin usar JavaScript -->
        <a href="#tienda" class="btn-enter">
            Entrar
        </a>
    </div>

    <!-- SECCIÓN DE LA TIENDA -->
    <div id="tienda" class="store-section">
        <h2 class="store-title">Nuestros Productos</h2>
        
        <div class="products-grid">
            <!-- Producto 1 -->
            <div class="product-card">
                <h3>Bananos Maduros</h3>
                <div class="product-price">L. 25.00</div>
                <button class="btn-cart" onclick="alert('¡Producto añadido!')">Añadir al Carrito</button>
            </div>

            <!-- Producto 2 -->
            <div class="product-card">
                <h3>Frijoles Rojos (1 Lb)</h3>
                <div class="product-price">L. 35.00</div>
                <button class="btn-cart" onclick="alert('¡Producto añadido!')">Añadir al Carrito</button>
            </div>
            
            <!-- Producto 3 -->
            <div class="product-card">
                <h3>Arroz Clasificado (1 Lb)</h3>
                <div class="product-price">L. 18.00</div>
                <button class="btn-cart" onclick="alert('¡Producto añadido!')">Añadir al Carrito</button>
            </div>
        </div>
    </div>

</body>
</html>
