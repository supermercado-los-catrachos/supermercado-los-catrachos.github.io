<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Supermercado Los Catrachos - Tu tienda en línea</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* ========== ESTILOS BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s;
        }
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #212529;
            --text-secondary: #495057;
            --header-bg: #0056b3;
            --header-text: white;
            --border: #dee2e6;
            --price-color: #28a745;
            --btn-bg: #25d366;
            --btn-hover: #20b859;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --badge-bg: #ffc107;
            --badge-text: #212529;
            --nav-bg: #004d40;
        }
        body.dark {
            --bg-body: #121212;
            --bg-card: #1e1e2f;
            --text-primary: #f0f0f0;
            --text-secondary: #bbbbbb;
            --border: #2c2c3a;
            --price-color: #6fcf97;
            --btn-bg: #128c7e;
            --btn-hover: #075e54;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --badge-bg: #e6a700;
            --badge-text: #121212;
            --nav-bg: #00251a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* ========== PANTALLA DE BIENVENIDA (FORZADA) ========== */
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0f6840, #144d34);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999; /* Máxima prioridad para cubrir todo */
            color: white;
            text-align: center;
            padding: 20px;
        }
        .welcome-logo-circle {
            width: 100px;
            height: 100px;
            border: 2px solid #ffc107;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffc107;
            margin-bottom: 30px;
        }
        .welcome-screen h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .welcome-screen p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .welcome-divider {
            width: 250px;
            height: 5px;
            background-color: #ffc107;
            border-radius: 10px;
            margin-bottom: 40px;
        }
        .btn-enter {
            background-color: #ffc107;
            color: #121212;
            border: none;
            padding: 14px 60px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-enter:hover {
            background-color: #e6a700;
        }

        /* ========== CONTENIDO TIENDA ========== */
        .top-nav {
            background: var(--nav-bg);
            color: white;
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 300;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo { font-size: 1.3rem; font-weight: bold; }
        .nav-controls { display: flex; gap: 12px; align-items: center; }
        .dark-toggle-nav, .cart-icon-nav {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.3rem;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .cart-icon-nav { position: relative; }
        #cartCountBadgeNav {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--badge-bg);
            color: var(--badge-text);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .main-header {
            background-color: var(--header-bg);
            color: var(--header-text);
            text-align: center;
            padding: 40px 20px;
        }
        .search-container {
            display: flex;
            justify-content: center;
            padding: 15px 20px;
            position: sticky;
            top: 52px;
            z-index: 199;
            background-color: var(--bg-body);
            border-bottom: 1px solid var(--border);
        }
        #searchInput {
            width: 90%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .main-content { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .category-section { margin-bottom: 30px; background: var(--bg-card); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
        .category-header { background: linear-gradient(135deg, var(--header-bg), var(--nav-bg)); color: white; padding: 15px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 1.3rem; font-weight: bold; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 25px; }
        .category-content.collapsed .products-grid { display: none; }
        .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card i.prod-icon { font-size: 3.5rem; margin: 15px 0; color: var(--header-bg); }
        .product-price { color: var(--price-color); font-weight: bold; font-size: 1.2rem; margin: 10px 0; }
        .btn-add { background-color: var(--btn-bg); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-add:hover { background-color: var(--btn-hover); }
        .btn-whatsapp-order { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 999; }
    </style>
</head>
<body>

    <!-- PANTALLA DE BIENVENIDA (COMO TU IMAGEN) -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-logo-circle">LCH</div>
        <h1>Supermercado Los Catrachos</h1>
        <p>Calidad y frescura a tu alcance</p>
        <div class="welcome-divider"></div>
        <!-- Se añade el evento directamente en línea para garantizar su ejecución -->
        <button class="btn-enter" onclick="document.getElementById('welcomeScreen').style.display='none';">Entrar</button>
    </div>

    <!-- CONTENIDO COMPLETO DE LA TIENDA -->
    <nav class="top-nav">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-shopping-basket"></i> Los Catrachos</div>
            <div class="nav-controls">
                <button class="dark-toggle-nav" id="darkModeBtn"><i class="fas fa-moon"></i></button>
                <div class="cart-icon-nav"><i class="fas fa-shopping-cart"></i><span id="cartCountBadgeNav">0</span></div>
            </div>
        </div>
    </nav>

    <header class="main-header">
        <h1>Supermercado Los Catrachos</h1>
        <p>Calidad y frescura directo a tu hogar</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="¿Qué producto buscas hoy?...">
    </div>

    <main class="main-content">
        <div class="category-section">
            <div class="category-header" onclick="toggleCategory(this)">
                <span><i class="fas fa-box"></i> Abarrotes</span>
                <i class="fas fa-chevron-down arrow"></i>
            </div>
            <div class="category-content">
                <div class="products-grid">
                    <div class="product-card" data-name="arroz progreso">
                        <i class="fas fa-seedling prod-icon"></i>
                        <h3>Arroz Progreso (1 Lb)</h3>
                        <p class="product-price">L. 15.00</p>
                        <button class="btn-add" onclick="addToCart('Arroz Progreso', 15)">Agregar</button>
                    </div>
                    <div class="product-card" data-name="frijoles rojos de la hoya">
                        <i class="fas fa-boxes prod-icon"></i>
                        <h3>Frijoles Rojos (1 Lb)</h3>
                        <p class="product-price">L. 35.00</p>
                        <button class="btn-add" onclick="addToCart('Frijoles Rojos', 35)">Agregar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
